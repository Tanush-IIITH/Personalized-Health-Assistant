<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Detail — HealthCompanion Doctor</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #10785A;
      --primary-dark: #0B5E46;
      --primary-deeper: #084235;
      --primary-light: #E8F5F0;
      --primary-muted: #B4D7CC;
      --accent-warm: #2D9B7A;
      --warning: #C27817;
      --warning-bg: #FDF6EC;
      --danger: #C0392B;
      --danger-bg: #FDECEB;
      --success: #1E7D5A;
      --success-bg: #E8F5F0;
      --bg-app: #F5F7F6;
      --bg-card: #FFFFFF;
      --bg-input: #F0F2F1;
      --text-primary: #1A2B25;
      --text-secondary: #506B60;
      --text-muted: #8FA69B;
      --border: #DAE3DE;
      --border-light: #E8EEEB;
      --shadow-xs: 0 1px 2px rgba(16,120,90,0.04);
      --shadow-sm: 0 1px 3px rgba(16,120,90,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(16,120,90,0.08), 0 1px 3px rgba(0,0,0,0.04);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --radius-xl: 18px;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-app);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ──────────────────────────────────────────── */
    .layout { display: flex; min-height: 100vh; }

    .sidebar {
      width: 240px; flex-shrink: 0;
      background: white;
      border-right: 1px solid var(--border-light);
      display: flex; flex-direction: column;
      position: sticky; top: 0; height: 100vh;
    }
    .sidebar-brand { padding: 22px 20px 20px; border-bottom: 1px solid var(--border-light); }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .sidebar-logo-icon { width: 34px; height: 34px; background: var(--primary); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
    .sidebar-logo-icon svg { width: 18px; height: 18px; stroke: white; fill: none; stroke-width: 2; stroke-linecap: round; }
    .sidebar-app-name { font-size: 15px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.3px; }
    .sidebar-portal-tag { font-size: 10px; color: var(--primary); font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; margin-left: 44px; }
    .sidebar-nav { padding: 12px 10px; flex: 1; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; color: var(--text-secondary); cursor: pointer; transition: all .15s; text-decoration: none; margin-bottom: 2px; }
    .nav-item svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; flex-shrink: 0; }
    .nav-item:hover { background: var(--bg-app); color: var(--text-primary); }
    .sidebar-footer { padding: 14px 10px; border-top: 1px solid var(--border-light); }
    .doctor-avatar { width: 36px; height: 36px; border-radius: 10px; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .doctor-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .doctor-role { font-size: 11px; color: var(--text-muted); }
    .doctor-info { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); }
    .logout-btn { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all .15s; background: none; border: none; font-family: inherit; width: 100%; margin-top: 4px; }
    .logout-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }
    .logout-btn:hover { color: var(--danger); background: var(--danger-bg); }
    .edit-profile-btn { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all .15s; background: none; border: none; font-family: inherit; width: 100%; margin-top: 2px; }
    .edit-profile-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }
    .edit-profile-btn:hover { color: var(--primary); background: var(--primary-light); }

    /* ── Main ─────────────────────────────────────────────── */
    .main { flex: 1; display: flex; flex-direction: column; min-height: 100vh; overflow: hidden; }

    .top-bar { background: white; border-bottom: 1px solid var(--border-light); padding: 14px 28px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 10; }
    .back-btn { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; text-decoration: none; transition: color .15s; padding: 6px 10px; border-radius: var(--radius-sm); }
    .back-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }
    .back-btn:hover { color: var(--primary); background: var(--primary-light); }
    .top-bar-divider { width: 1px; height: 20px; background: var(--border); }
    .top-bar-title { font-size: 16px; font-weight: 700; color: var(--text-primary); }
    .top-bar-actions { margin-left: auto; display: flex; gap: 8px; }

    .btn-primary { display: inline-flex; align-items: center; gap: 7px; padding: 9px 16px; background: var(--primary); color: white; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background .15s; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
    .btn-primary svg { width: 14px; height: 14px; stroke: white; fill: none; stroke-width: 2; stroke-linecap: round; }

    .btn-outline { display: inline-flex; align-items: center; gap: 7px; padding: 8px 14px; background: transparent; color: var(--text-secondary); border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all .15s; }
    .btn-outline:hover { border-color: var(--text-muted); background: var(--bg-app); }

    .content { padding: 24px 28px; flex: 1; overflow-y: auto; }

    /* ── Patient Hero ─────────────────────────────────────── */
    .patient-hero {
      background: white; border-radius: var(--radius-xl);
      border: 1px solid var(--border-light); box-shadow: var(--shadow-xs);
      padding: 24px 28px; margin-bottom: 20px;
      position: relative; overflow: hidden;
    }
    .patient-hero::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--primary), var(--accent-warm)); }
    .patient-hero.high::after { background: linear-gradient(90deg, var(--danger), #E74C3C); }
    .patient-hero.medium::after { background: linear-gradient(90deg, var(--warning), #E67E22); }

    .hero-top { display: flex; align-items: flex-start; gap: 18px; margin-bottom: 20px; }
    .hero-avatar { width: 56px; height: 56px; border-radius: 16px; background: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; flex-shrink: 0; }
    .hero-avatar.high { background: var(--danger-bg); color: var(--danger); }
    .hero-avatar.medium { background: var(--warning-bg); color: var(--warning); }
    .hero-name { font-size: 22px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.4px; }
    .hero-sub { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
    .hero-badges { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; }
    .badge-risk { background: var(--primary-light); color: var(--primary); }
    .badge-risk.high { background: var(--danger-bg); color: var(--danger); }
    .badge-risk.medium { background: var(--warning-bg); color: var(--warning); }
    .badge-active { background: var(--success-bg); color: var(--success); }
    .badge-inactive { background: var(--bg-input); color: var(--text-muted); }

    .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
    .hero-field { background: var(--bg-app); border-radius: var(--radius-sm); padding: 12px 14px; }
    .hero-field-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .hero-field-value { font-size: 14px; font-weight: 600; color: var(--text-primary); }

    /* ── Tabs ────────────────────────────────────────────── */
    .tabs-bar { display: flex; gap: 2px; border-bottom: 1px solid var(--border-light); margin-bottom: 20px; background: white; padding: 0 28px; margin-left: -28px; margin-right: -28px; padding-top: 0; }
    .tab-btn { padding: 12px 18px; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; border: none; background: none; font-family: inherit; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s, border-color .15s; white-space: nowrap; }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Cards / Sections ────────────────────────────────── */
    .card { background: white; border-radius: var(--radius-lg); border: 1px solid var(--border-light); box-shadow: var(--shadow-xs); margin-bottom: 16px; overflow: hidden; }
    .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; }
    .card-title { font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; }
    .card-body { padding: 20px; }

    .section-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 12px; }

    /* ── Vitals Grid ─────────────────────────────────────── */
    .vitals-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
    .vital-tile { background: var(--bg-app); border-radius: var(--radius-md); padding: 14px 16px; }
    .vital-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; font-size: 14px; }
    .vital-icon.heart { background: #FDF0F0; color: #D94F4F; }
    .vital-icon.steps { background: var(--primary-light); color: var(--primary); }
    .vital-icon.sleep { background: #F0EEFF; color: #6B5CE7; }
    .vital-icon.spo2  { background: #EDF5FC; color: #2D8BC9; }
    .vital-icon.calories { background: #FDF6EC; color: var(--warning); }
    .vital-icon.stress { background: #FDECEB; color: var(--danger); }
    .vital-name { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .vital-value { font-size: 22px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.5px; font-family: 'IBM Plex Mono', monospace; }
    .vital-unit { font-size: 11px; color: var(--text-muted); font-weight: 500; font-family: inherit; }

    /* ── Trends ───────────────────────────────────────────── */
    .trend-stack { display: grid; gap: 14px; }
    .trend-group { display: grid; gap: 12px; }
    .trend-group-title { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.7px; }
    .trend-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
    .trend-card { background: var(--bg-app); border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 14px 16px; }
    .trend-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
    .trend-name { font-size: 13px; font-weight: 700; color: var(--text-primary); }
    .trend-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .trend-direction { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; padding: 4px 8px; border-radius: 999px; background: white; border: 1px solid var(--border-light); white-space: nowrap; }
    .trend-direction.up { color: var(--danger); border-color: rgba(192,57,43,.18); background: var(--danger-bg); }
    .trend-direction.down { color: var(--primary); border-color: rgba(16,120,90,.18); background: var(--primary-light); }
    .trend-direction.stable { color: var(--text-secondary); }
    .trend-values { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
    .trend-latest { font-size: 24px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.6px; font-family: 'IBM Plex Mono', monospace; line-height: 1; }
    .trend-unit { font-size: 11px; color: var(--text-muted); font-weight: 600; font-family: inherit; margin-left: 4px; }
    .trend-delta { font-size: 12px; font-weight: 700; }
    .trend-delta.up { color: var(--danger); }
    .trend-delta.down { color: var(--primary); }
    .trend-delta.stable { color: var(--text-secondary); }
    .trend-chart { width: 100%; height: 72px; display: block; margin: 8px 0 10px; }
    .trend-chart-bg { fill: none; stroke: var(--border-light); stroke-width: 1; }
    .trend-chart-line { fill: none; stroke: var(--primary); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .trend-chart-dot { fill: var(--primary); }
    .trend-meta { display: flex; justify-content: space-between; gap: 12px; font-size: 11px; color: var(--text-muted); }
    .trend-empty { padding: 18px; border-radius: var(--radius-md); background: var(--bg-app); color: var(--text-muted); font-size: 13px; }

    /* ── Alerts ───────────────────────────────────────────── */
    .alert-card {
      border-left: 3px solid var(--warning);
      background: var(--warning-bg);
      padding: 14px 16px; border-radius: var(--radius-sm); margin-bottom: 10px;
    }
    .alert-card.high { border-left-color: var(--danger); background: var(--danger-bg); }
    .alert-card.low  { border-left-color: var(--primary); background: var(--primary-light); }
    .alert-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .alert-title { font-size: 13px; font-weight: 700; color: var(--text-primary); }
    .alert-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
    .alert-badge.high { background: var(--danger); color: white; }
    .alert-badge.medium { background: var(--warning); color: white; }
    .alert-badge.low { background: var(--primary); color: white; }
    .alert-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.55; }
    .alert-time { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
    .alerts-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .alerts-filter-wrap { display: flex; align-items: center; gap: 8px; }
    .alerts-filter-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .alerts-filter {
      padding: 8px 12px; background: white; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-size: 13px; color: var(--text-secondary);
      font-family: inherit; outline: none;
    }
    .alerts-filter:focus { border-color: var(--primary); }
    .alerts-count-note { font-size: 12px; color: var(--text-muted); }

    /* ── Alert Summary Counts ─────────────────────────────── */
    .alert-counts { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 18px; }
    .alert-count-tile { text-align: center; padding: 14px 10px; border-radius: var(--radius-md); background: var(--bg-app); }
    .alert-count-val { font-size: 28px; font-weight: 700; line-height: 1; font-family: 'IBM Plex Mono', monospace; }
    .alert-count-val.high { color: var(--danger); }
    .alert-count-val.medium { color: var(--warning); }
    .alert-count-val.low { color: var(--primary); }
    .alert-count-lbl { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; margin-top: 4px; }

    /* ── Reports ─────────────────────────────────────────── */
    .report-row {
      padding: 14px 20px; border-bottom: 1px solid var(--border-light);
      display: flex; align-items: center; gap: 14px;
      cursor: pointer; transition: background .1s;
    }
    .report-row:last-child { border-bottom: none; }
    .report-row:hover { background: var(--bg-app); }
    .report-icon { width: 36px; height: 36px; background: var(--primary-light); border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .report-icon svg { width: 16px; height: 16px; stroke: var(--primary); fill: none; stroke-width: 2; stroke-linecap: round; }
    .report-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .report-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .report-status { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 3px; text-transform: uppercase; }
    .report-status.done { background: var(--success-bg); color: var(--success); }
    .report-status.pending { background: var(--warning-bg); color: var(--warning); }
    .report-chevron { margin-left: auto; color: var(--text-muted); font-size: 18px; }

    .report-detail { display: none; padding: 14px 20px; background: var(--bg-app); border-bottom: 1px solid var(--border-light); }
    .report-detail.open { display: block; }

    /* ── Lab Table ───────────────────────────────────────── */
    .lab-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .lab-table th { text-align: left; padding: 8px 10px; font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border-light); }
    .lab-table td { padding: 10px 10px; border-bottom: 1px solid var(--border-light); color: var(--text-secondary); }
    .lab-table tr:last-child td { border-bottom: none; }
    .lab-table tr:hover td { background: var(--bg-app); }
    .flag { display: inline-flex; width: 18px; height: 18px; align-items: center; justify-content: center; border-radius: 4px; font-size: 10px; font-weight: 700; }
    .flag.H { background: var(--danger-bg); color: var(--danger); }
    .flag.L { background: #EDF5FC; color: #2D8BC9; }
    .flag.N { background: var(--success-bg); color: var(--success); }

    /* ── Eval Result ─────────────────────────────────────────────── */
    .eval-result { padding: 12px 16px; border-radius: var(--radius-sm); background: var(--success-bg); border: 1px solid rgba(16,120,90,0.15); border-left: 3px solid var(--primary); font-size: 13px; color: var(--text-secondary); margin-top: 14px; }

    /* ── Generate Summary Banner ─────────────────────────────────── */
    .summary-banner {
      background: linear-gradient(135deg, var(--primary-deeper) 0%, var(--primary) 100%);
      border-radius: var(--radius-lg); padding: 20px 24px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; margin-bottom: 16px; position: relative; overflow: hidden;
    }
    .summary-banner::before {
      content: ''; position: absolute; top: -40px; right: -40px;
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(255,255,255,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .summary-banner-text,
    .summary-banner-controls { position: relative; z-index: 1; }
    .summary-banner-text h3 { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .summary-banner-text p  { font-size: 12px; color: rgba(255,255,255,0.65); line-height: 1.5; }
    .summary-banner-controls { display: flex; align-items: flex-end; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .summary-timeframe-wrap { display: grid; gap: 4px; min-width: 165px; }
    .summary-timeframe-label {
      font-size: 10px;
      color: rgba(255,255,255,0.75);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .summary-timeframe-select {
      width: 100%;
      padding: 8px 11px;
      background: rgba(255,255,255,0.14);
      border: 1.5px solid rgba(255,255,255,0.24);
      color: white;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      outline: none;
      transition: border-color .15s, background .15s;
    }
    .summary-timeframe-select:focus {
      border-color: rgba(255,255,255,0.45);
      background: rgba(255,255,255,0.2);
    }
    .summary-timeframe-select option { color: var(--text-primary); background: white; }
    .btn-generate {
      display: inline-flex; align-items: center; gap: 8px; flex-shrink: 0;
      padding: 10px 18px; background: rgba(255,255,255,0.12); color: #fff;
      border: 1.5px solid rgba(255,255,255,0.22); border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: background .15s, border-color .15s;
      backdrop-filter: blur(4px);
    }
    .btn-generate:hover  { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.4); }
    .btn-generate:disabled { opacity: .6; cursor: not-allowed; }
    .btn-generate svg { width: 15px; height: 15px; stroke: white; fill: none; stroke-width: 2; stroke-linecap: round; }
    .summary-meta-note { font-size: 11px; color: var(--text-muted); margin-top: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin .8s linear infinite; display: inline-block; }

    /* ── Profile Edit button in sidebar ─────────────────────────── */
    .edit-profile-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 500; color: var(--text-muted);
      cursor: pointer; transition: all .15s; background: none; border: none;
      font-family: inherit; width: 100%; margin-top: 2px;
    }
    .edit-profile-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }
    .edit-profile-btn:hover { color: var(--primary); background: var(--primary-light); }

    /* ── Profile Modal ───────────────────────────────────────────── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(26,43,37,.38); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 200; opacity: 0; pointer-events: none; transition: opacity .2s; }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal { background: white; border-radius: var(--radius-xl); padding: 28px; width: 100%; max-width: 460px; box-shadow: var(--shadow-md); transform: translateY(14px); transition: transform .22s; border: 1px solid var(--border-light); max-height: 90vh; overflow-y: auto; }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .modal-title { font-size: 17px; font-weight: 700; color: var(--text-primary); }
    .modal-close { width: 30px; height: 30px; border: none; background: var(--bg-app); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--text-muted); transition: background .15s; }
    .modal-close:hover { background: var(--border); }
    .modal-section-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin: 16px 0 10px; }
    .modal-field { margin-bottom: 14px; }
    .modal-field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.3px; }
    .modal-field input, .modal-field select { width: 100%; padding: 10px 12px; background: var(--bg-input); border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; color: var(--text-primary); transition: border-color .2s; }
    .modal-field input:focus, .modal-field select:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(16,120,90,0.08); }
    .modal-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-error { font-size: 12px; color: var(--danger); background: var(--danger-bg); border: 1px solid rgba(192,57,43,.15); border-left: 3px solid var(--danger); border-radius: var(--radius-sm); padding: 9px 12px; margin-top: 12px; display: none; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 22px; }
    .btn-cancel-m { padding: 9px 16px; background: transparent; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; font-family: inherit; color: var(--text-secondary); cursor: pointer; transition: all .15s; }
    .btn-cancel-m:hover { border-color: var(--text-muted); }
    .btn-save-m { padding: 9px 20px; background: var(--primary); color: white; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background .15s; }
    .btn-save-m:hover { background: var(--primary-dark); }
    .btn-save-m:disabled { opacity: .6; cursor: not-allowed; }

    /* ── AI Summary ──────────────────────────────────────── */
    .insight-panel {
      background: var(--primary-deeper); color: white;
      padding: 22px 24px; border-radius: var(--radius-lg);
      margin-bottom: 16px; position: relative; overflow: hidden;
    }
    .insight-panel::before { content: ''; position: absolute; bottom: -30px; right: -30px; width: 160px; height: 160px; background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%); pointer-events: none; }
    .insight-tag { font-size: 10px; font-weight: 700; color: var(--primary-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .insight-text { font-size: 14px; line-height: 1.65; opacity: 0.9; }

    /* ── Eval Result ─────────────────────────────────────── */
    .eval-result { padding: 12px 16px; border-radius: var(--radius-sm); background: var(--success-bg); border: 1px solid rgba(16,120,90,0.15); border-left: 3px solid var(--primary); font-size: 13px; color: var(--text-secondary); margin-top: 14px; }

    /* ── Doctor AI Chat ──────────────────────────────────── */
    .doctor-chat-shell { display: grid; gap: 12px; }
    .doctor-chat-thread {
      background: var(--bg-app);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: 14px;
      min-height: 260px;
      max-height: 460px;
      overflow-y: auto;
      display: grid;
      gap: 10px;
    }
    .doctor-chat-message { display: flex; gap: 8px; max-width: 90%; }
    .doctor-chat-message.user { margin-left: auto; flex-direction: row-reverse; }
    .doctor-chat-message-main { display: grid; gap: 6px; }
    .doctor-chat-avatar {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0.4px;
      background: var(--primary-light);
      color: var(--primary);
    }
    .doctor-chat-message.user .doctor-chat-avatar {
      background: var(--primary);
      color: white;
    }
    .doctor-chat-bubble {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-primary);
      background: white;
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 10px 12px;
      box-shadow: var(--shadow-xs);
      overflow-wrap: anywhere;
    }
    .doctor-chat-message.user .doctor-chat-bubble {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }
    .doctor-chat-bubble code {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      background: rgba(26,43,37,0.08);
      padding: 1px 4px;
      border-radius: 4px;
    }
    .doctor-chat-message.user .doctor-chat-bubble code {
      background: rgba(255,255,255,0.2);
    }
    .doctor-chat-sources { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .doctor-chat-source {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-secondary);
      border: 1px solid var(--border);
      background: white;
      border-radius: 999px;
      padding: 4px 8px;
      text-decoration: none;
    }
    .doctor-chat-source:hover { border-color: var(--primary-muted); color: var(--primary-dark); }
    .doctor-chat-note {
      margin-top: 6px;
      font-size: 11px;
      color: var(--warning);
      background: var(--warning-bg);
      border: 1px solid rgba(194,120,23,0.2);
      border-radius: var(--radius-sm);
      padding: 6px 8px;
    }
    .doctor-chat-note.warn {
      color: var(--danger);
      background: var(--danger-bg);
      border-color: rgba(192,57,43,0.2);
    }
    .doctor-chat-actions { display: flex; gap: 6px; }
    .doctor-chat-action-btn {
      width: 30px;
      height: 30px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: white;
      color: var(--text-secondary);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }
    .doctor-chat-action-btn:hover {
      border-color: var(--primary-muted);
      color: var(--primary-dark);
      background: var(--primary-light);
    }
    .doctor-chat-action-btn svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .doctor-chat-composer { display: flex; gap: 10px; align-items: center; }
    .doctor-chat-input {
      flex: 1;
      padding: 11px 12px;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--text-primary);
      font-family: inherit;
      outline: none;
      transition: border-color .15s, background .15s;
    }
    .doctor-chat-input:focus {
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 3px rgba(16,120,90,0.08);
    }
    .doctor-chat-mic-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 12px;
      font-size: 12px;
      font-weight: 700;
    }
    .doctor-chat-mic-btn.active {
      color: var(--danger);
      border-color: rgba(192,57,43,0.35);
      background: var(--danger-bg);
    }
    .doctor-chat-mic-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .doctor-chat-dots span {
      display: inline-block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--text-muted);
      margin-left: 3px;
      animation: chat-dot-pulse 1s infinite ease-in-out;
    }
    .doctor-chat-dots span:nth-child(2) { animation-delay: 0.15s; }
    .doctor-chat-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes chat-dot-pulse {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ── Skeleton / Loading ──────────────────────────────── */
    .skel { background: linear-gradient(90deg, var(--bg-app) 25%, var(--border-light) 50%, var(--bg-app) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 4px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .empty-state { text-align: center; padding: 40px 20px; }
    .empty-icon { width: 52px; height: 52px; background: var(--primary-light); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
    .empty-icon svg { width: 22px; height: 22px; stroke: var(--primary); fill: none; stroke-width: 1.8; stroke-linecap: round; }
    .empty-title { font-size: 14px; font-weight: 700; color: var(--text-secondary); margin-bottom: 4px; }
    .empty-sub { font-size: 13px; color: var(--text-muted); }

    /* ── Toast ───────────────────────────────────────────── */
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 12px 18px; border-radius: var(--radius-md); font-size: 13px; font-weight: 600; color: white; box-shadow: var(--shadow-md); animation: slideUp .25s ease-out; max-width: 320px; }
    .toast.success { background: var(--primary); }
    .toast.error { background: var(--danger); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 800px) {
      .two-col { grid-template-columns: 1fr; }
      .doctor-chat-message { max-width: 96%; }
      .doctor-chat-composer { flex-direction: column; align-items: stretch; }
      .doctor-chat-composer .btn-primary { justify-content: center; }
      .summary-banner-controls { justify-content: flex-start; width: 100%; }
      .summary-timeframe-wrap { width: 100%; }
    }
  </style>
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">

  <!-- Main -->

<!-- Edit Profile Modal -->

<script src="js/doctor-api.js"></script>
<script>
  if (!localStorage.getItem('hc_access_token')) window.location.href = 'doctor-login.html';

  const params    = new URLSearchParams(location.search);
  const PATIENT_ID = params.get('patient_id');
  if (!PATIENT_ID) { alert('No patient ID specified.'); window.location.href = 'doctor-dashboard.html'; }

  // Lazy-load trackers
  const loaded = { overview: false, reports: false, labs: false, alerts: false, chat: false };
  const SUMMARY_TIMEFRAMES = {
    weekly: { days: 7, label: 'Last 7 Days' },
    monthly: { days: 30, label: 'Last 30 Days' },
    quarterly: { days: 90, label: 'Last 90 Days' },
  };
  let allAlerts = [];
  let currentAlertSeverity = 'all';
  let selectedSummaryTimeframe = 'weekly';
  const summaryByTimeframe = {};
  let doctorChatMessages = [];
  let doctorChatBusy = false;
  let doctorChatRecording = false;
  let doctorChatMediaRecorder = null;
  let doctorChatAudioChunks = [];
  let doctorChatPlaybackAudio = null;
  let doctorSpeechRecognition = null;

  async function init() {
    await Promise.all([loadProfile(), loadSummary()]);
  }

  async function loadProfile() {
    try {
      const p = await DoctorAPI.getProfile();
      const name = p.full_name || p.email || 'Doctor';
      document.getElementById('sidebar-name').textContent = name;
      document.getElementById('sidebar-avatar').textContent = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    } catch(e) {}
  }

  // ── Summary (Overview) ────────────────────────────────
  async function loadSummary() {
    try {
      const [summaryResult, trendsResult] = await Promise.allSettled([
        DoctorAPI.getPatientSummary(PATIENT_ID),
        DoctorAPI.getPatientTrends(PATIENT_ID),
      ]);
      if (summaryResult.status !== 'fulfilled') throw summaryResult.reason;
      loaded.overview = true;
      renderOverview(
        summaryResult.value,
        trendsResult.status === 'fulfilled' ? trendsResult.value : null
      );
    } catch(e) {
      document.getElementById('main-content').innerHTML = `
        <div style="padding:40px;text-align:center;color:var(--danger)">
          <p style="font-size:14px">Failed to load patient: ${e.message}</p>
          <a href="doctor-dashboard.html" style="color:var(--primary);font-size:13px;font-weight:600;text-decoration:none;margin-top:8px;display:inline-block">← Back to roster</a>
        </div>`;
    }
  }

  function renderHero(p, risk) {
    if (!p) return;
    risk = risk || 'low';
    const init  = (p.full_name || 'P').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const dob   = p.date_of_birth ? new Date(p.date_of_birth).toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'}) : '—';
    const doc   = document.getElementById('page-title');
    if (doc) doc.textContent = p.full_name || 'Patient Detail';

    const heroEl = document.createElement('div');
    heroEl.id = 'hero-section';
    heroEl.innerHTML = `
    <div class="patient-hero ${risk}" style="margin-bottom:0">
      <div class="hero-top">
        <div class="hero-avatar ${risk}">${init}</div>
        <div style="flex:1">
          <div class="hero-name">${p.full_name || '—'}</div>
          <div class="hero-sub">${p.email || ''} · ${p.phone || '—'}</div>
          <div class="hero-badges">
            <span class="badge badge-risk ${risk}">${risk} risk</span>
            <span class="badge ${p.is_active===false?'badge-inactive':'badge-active'}">${p.is_active===false?'Inactive':'Active'}</span>
          </div>
        </div>
      </div>
      <div class="hero-grid">
        <div class="hero-field"><div class="hero-field-label">Age</div><div class="hero-field-value">${p.age||'—'} years</div></div>
        <div class="hero-field"><div class="hero-field-label">Gender</div><div class="hero-field-value">${p.gender||'—'}</div></div>
        <div class="hero-field"><div class="hero-field-label">Date of Birth</div><div class="hero-field-value">${dob}</div></div>
        <div class="hero-field"><div class="hero-field-label">City</div><div class="hero-field-value">${p.city||'—'}</div></div>
        <div class="hero-field"><div class="hero-field-label">Blood Group</div><div class="hero-field-value">${p.blood_group||'—'}</div></div>
        <div class="hero-field"><div class="hero-field-label">Height / Weight</div><div class="hero-field-value">${p.height_cm?p.height_cm+'cm':'—'} / ${p.weight_kg?p.weight_kg+'kg':'—'}</div></div>
      </div>
    </div>`;
    return heroEl;
  }

  function renderOverview(data, trendData) {
    // ── Backend shape: { patient, reports:{total,recent}, alerts:{high,medium,low,total,recent},
    //                    latest_health_summary, wearable_vitals:{metric_type:{avg,min,max,...}} }
    const p = data.patient || {};

    // Derive risk from alerts
    const alertSum = data.alerts || {};
    const risk = alertSum.high > 0 ? 'high' : alertSum.medium > 0 ? 'medium' : 'low';
    const heroEl = renderHero(p, risk);

    // Build wearable tiles from all metrics returned by the backend.
    const rawVitals = data.wearable_vitals || {};
    const metricOrder = [
      'heart_rate',
      'resting_heart_rate',
      'spo2',
      'hrv_ms',
      'sleep_minutes',
      'deep_sleep_minutes',
      'sleep_score',
      'steps',
      'active_minutes',
      'calories_burned',
    ];
    const cumulativeMetrics = new Set(['steps', 'calories_burned', 'active_minutes']);
    const metricPresentation = {
      heart_rate: { label: 'Heart Rate', iconClass: 'heart', iconText: 'HR', unit: 'bpm' },
      resting_heart_rate: { label: 'Resting HR', iconClass: 'heart', iconText: 'RHR', unit: 'bpm' },
      spo2: { label: 'SpO2', iconClass: 'spo2', iconText: 'O2', unit: '%' },
      hrv_ms: { label: 'HRV', iconClass: 'stress', iconText: 'HRV', unit: 'ms' },
      sleep_minutes: { label: 'Sleep', iconClass: 'sleep', iconText: 'SL', unit: 'hrs' },
      deep_sleep_minutes: { label: 'Deep Sleep', iconClass: 'sleep', iconText: 'DS', unit: 'min' },
      sleep_score: { label: 'Sleep Score', iconClass: 'sleep', iconText: 'SS', unit: 'score' },

  function renderTrendsSection(data) {
    const labTrends = data?.lab_trends || [];
    const wearableTrends = data?.wearable_trends || [];

    if (!labTrends.length && !wearableTrends.length) {
      return `<div class="trend-empty">No trend history is available yet. Upload multiple reports or sync wearable readings to show change over time.</div>`;
    }

    return `
      <div class="trend-stack">
        ${labTrends.length ? `
          <div class="trend-group">
            <div class="trend-group-title">Lab Trends</div>
            <div class="trend-grid">${labTrends.map(series => renderTrendCard(series)).join('')}</div>
          </div>
        ` : ''}
        ${wearableTrends.length ? `
          <div class="trend-group">
            <div class="trend-group-title">Wearable Trends</div>
            <div class="trend-grid">${wearableTrends.map(series => renderTrendCard(series)).join('')}</div>
          </div>
        ` : ''}
      </div>
    `;
  }

  function renderTrendCard(series) {
    const points = series?.points || [];
    const stats = series?.stats || {};
    const direction = stats.direction || 'stable';
    const latest = formatTrendValue(stats.latest_value);
    const delta = formatTrendDelta(stats.delta);
    const chart = renderSparkline(points);
    const startDate = formatTrendDate(points[0]?.date_label || points[0]?.timestamp);
    const endDate = formatTrendDate(points[points.length - 1]?.date_label || points[points.length - 1]?.timestamp);
    const periodLabel = startDate && endDate ? `${startDate} to ${endDate}` : 'Recent data';
    const unit = series?.unit ? `<span class="trend-unit">${escapeHtml(series.unit)}</span>` : '';
    const metaRight = series?.reference_range
      ? `Ref: ${escapeHtml(series.reference_range)}`
      : `${points.length} reading${points.length === 1 ? '' : 's'} recorded`;

    return `
      <div class="trend-card">
        <div class="trend-card-top">
          <div>
            <div class="trend-name">${escapeHtml(series?.label || 'Trend')}</div>
            <div class="trend-sub">${periodLabel}</div>
          </div>
          <div class="trend-direction ${direction}">${direction === 'up' ? 'Rising' : direction === 'down' ? 'Falling' : 'Stable'}</div>
        </div>
        <div class="trend-values">
          <div class="trend-latest">${latest}${unit}</div>
          <div class="trend-delta ${direction}">${delta}</div>
        </div>
        ${chart}
        <div class="trend-meta">
          <span>Start: ${formatTrendValue(stats.first_value)}</span>
          <span>${metaRight}</span>
        </div>
      </div>
    `;
  }

  function renderSparkline(points) {
    const cleanPoints = (points || []).filter(point => Number.isFinite(Number(point?.value)));
    if (!cleanPoints.length) {
      return `<div class="trend-empty" style="padding:12px">No numeric samples available.</div>`;
    }

    if (cleanPoints.length === 1) {
      return `
        <svg class="trend-chart" viewBox="0 0 240 72" preserveAspectRatio="none" aria-hidden="true">
          <line class="trend-chart-bg" x1="0" y1="36" x2="240" y2="36"></line>
          <circle class="trend-chart-dot" cx="120" cy="36" r="4"></circle>
        </svg>
      `;
    }

    const values = cleanPoints.map(point => Number(point.value));
    const min = Math.min(...values);
    const max = Math.max(...values);
    const range = max - min || 1;
    const width = 240;
    const height = 72;
    const path = cleanPoints.map((point, index) => {
      const x = (index / (cleanPoints.length - 1)) * width;
      const y = height - (((Number(point.value) - min) / range) * (height - 12) + 6);
      return `${index === 0 ? 'M' : 'L'}${x.toFixed(2)} ${y.toFixed(2)}`;
    }).join(' ');
    const lastX = width;
    const lastY = height - (((values[values.length - 1] - min) / range) * (height - 12) + 6);

    return `
      <svg class="trend-chart" viewBox="0 0 240 72" preserveAspectRatio="none" aria-hidden="true">
        <line class="trend-chart-bg" x1="0" y1="64" x2="240" y2="64"></line>
        <path class="trend-chart-line" d="${path}"></path>
        <circle class="trend-chart-dot" cx="${lastX.toFixed(2)}" cy="${lastY.toFixed(2)}" r="3.5"></circle>
      </svg>
    `;
  }

  function formatTrendValue(value) {
    if (value == null || value === '') return '—';
    const num = Number(value);
    if (!Number.isFinite(num)) return escapeHtml(String(value));
    if (Math.abs(num) >= 1000) return num.toLocaleString('en-IN', { maximumFractionDigits: 1 });
    return num.toLocaleString('en-IN', { maximumFractionDigits: num % 1 === 0 ? 0 : 2 });
  }

  function formatTrendDelta(value) {
    if (value == null || !Number.isFinite(Number(value))) return 'No change';
    const num = Number(value);
    if (Math.abs(num) < 0.01) return 'No change';
    const prefix = num > 0 ? '+' : '';
    return `${prefix}${formatTrendValue(num)}`;
  }

  function formatTrendDate(value) {
    if (!value) return '';
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return escapeHtml(String(value));
    return date.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });
  }

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function normalizeSummaryTimeframe(timeframe) {
    return SUMMARY_TIMEFRAMES[timeframe] ? timeframe : 'weekly';
  }

  function summaryWindowLabel(timeframe) {
    const key = normalizeSummaryTimeframe(timeframe);
    return SUMMARY_TIMEFRAMES[key].label;
  }

  function summaryWindowDays(timeframe) {
    const key = normalizeSummaryTimeframe(timeframe);
    return SUMMARY_TIMEFRAMES[key].days;
  }

  function formatSummaryHtml(summaryRaw) {
    if (!summaryRaw) return '';
    return escapeHtml(summaryRaw)
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>');
  }

  function renderSummaryContent(summaryRow, timeframe) {
    if (summaryRow?.summary_content) {
      const formatted = formatSummaryHtml(summaryRow.summary_content);
      return `<div class="insight-panel"><div class="insight-tag">Doctor Summary · ${escapeHtml(summaryWindowLabel(timeframe))}</div><div class="insight-text">${formatted}</div></div>`;
    }

    return `<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div class="empty-title">No summary for ${summaryWindowLabel(timeframe)}</div><div class="empty-sub">Generate a summary for the last ${summaryWindowDays(timeframe)} days to populate this panel.</div></div>`;
  }

  function updateSummaryMetaNote(summaryRow, timeframe, errorText = null) {
    const metaEl = document.getElementById('summary-meta-note');
    if (!metaEl) return;

    if (errorText) {
      metaEl.textContent = errorText;
      metaEl.style.color = 'var(--danger)';
      return;
    }

    metaEl.style.color = 'var(--text-muted)';
    if (summaryRow?.created_at) {
      const generatedOn = new Date(summaryRow.created_at).toLocaleString('en-IN', {
        day: 'numeric',
        month: 'short',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
      });
      metaEl.textContent = `${summaryWindowLabel(timeframe)} summary · Generated ${generatedOn}`;
      return;
    }

    metaEl.textContent = `${summaryWindowLabel(timeframe)} summary not generated yet.`;
  }

  async function refreshSummaryForTimeframe(forceRefresh = false) {
    const timeframe = normalizeSummaryTimeframe(selectedSummaryTimeframe);
    const contentEl = document.getElementById('summary-content-area');
    if (!contentEl) return;

    if (!forceRefresh && summaryByTimeframe[timeframe]?.summary_content) {
      contentEl.innerHTML = renderSummaryContent(summaryByTimeframe[timeframe], timeframe);
      updateSummaryMetaNote(summaryByTimeframe[timeframe], timeframe);
      return;
    }

    contentEl.innerHTML = `<div class="skel" style="height:120px;border-radius:var(--radius-md)"></div>`;
    try {
      const res = await DoctorAPI.getPatientSummaries(PATIENT_ID, timeframe, 'doctor', 1);
      const summaryRow = res?.summaries?.[0] || null;

      if (summaryRow?.summary_content) {
        summaryByTimeframe[timeframe] = summaryRow;
      } else {
        delete summaryByTimeframe[timeframe];
      }

      contentEl.innerHTML = renderSummaryContent(summaryRow, timeframe);
      updateSummaryMetaNote(summaryRow, timeframe);
    } catch (e) {
      const fallback = summaryByTimeframe[timeframe] || null;
      contentEl.innerHTML = renderSummaryContent(fallback, timeframe);
      updateSummaryMetaNote(
        fallback,
        timeframe,
        e?.message ? `Could not load ${summaryWindowLabel(timeframe).toLowerCase()} summary (${e.message}).` : 'Could not load summary from server.'
      );
    }
  }

  function handleSummaryTimeframeChange(timeframe) {
    selectedSummaryTimeframe = normalizeSummaryTimeframe(timeframe);
    refreshSummaryForTimeframe(false);
  }

  function renderDoctorAnswer(answer) {
    let html = escapeHtml(answer || 'No answer returned by AI service.');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    return html.replace(/\n/g, '<br>');
  }

  function extractRagSources(chunks) {
    const out = [];
    const seen = new Set();

    for (const chunk of (chunks || [])) {
      const meta = chunk?.metadata || {};
      const filename = meta.source_filename || 'Clinical report';
      const page = Number.isFinite(Number(meta.page_number)) ? `Page ${meta.page_number}` : '';
      const section = meta.section_label ? `Section: ${String(meta.section_label).replace(/_/g, ' ')}` : '';
      const label = [filename, page, section].filter(Boolean).join(' · ');
      const url = meta.source_url || '';
      const key = `${label}|${url}`;
      if (seen.has(key)) continue;
      seen.add(key);
      out.push({ label, url });
      if (out.length >= 5) break;
    }

    return out;
  }

  function ensureDoctorChatReady() {
    if (loaded.chat) return;
    doctorChatMessages = [{
      role: 'assistant',
      content: 'Ask a clinical question about this patient. I will answer using the patient\'s report context, alerts, and available vitals.',
      sources: [],
      groundingAvailable: null,
      llmError: null,
      audioBase64: null,
      audioFormat: null,
    }];
    loaded.chat = true;
  }

  function markdownToSpeechText(value) {
    return String(value || '')
      .replace(/\*\*(.*?)\*\*/g, '$1')
      .replace(/\*(.*?)\*/g, '$1')
      .replace(/`([^`]+)`/g, '$1')
      .replace(/\[(.*?)\]\((.*?)\)/g, '$1');
  }

  function stopDoctorChatPlayback() {
    if (doctorChatPlaybackAudio) {
      try { doctorChatPlaybackAudio.pause(); } catch (_) {}
      doctorChatPlaybackAudio = null;
    }
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
    }
  }

  async function playDoctorChatMessage(index) {
    const msg = doctorChatMessages[index];
    if (!msg || msg.role === 'user') return;

    stopDoctorChatPlayback();

    if (msg.audioBase64) {
      const fmt = (msg.audioFormat || 'mp3').toLowerCase();
      const mime = fmt === 'wav' ? 'audio/wav' : 'audio/mpeg';
      const audio = new Audio(`data:${mime};base64,${msg.audioBase64}`);
      doctorChatPlaybackAudio = audio;
      audio.onended = () => {
        if (doctorChatPlaybackAudio === audio) doctorChatPlaybackAudio = null;
      };
      try {
        await audio.play();
        return;
      } catch (_) {
        doctorChatPlaybackAudio = null;
      }
    }

    if (!('speechSynthesis' in window)) {
      showToast('Audio playback is not supported in this browser.', 'error');
      return;
    }

    const utter = new SpeechSynthesisUtterance(markdownToSpeechText(msg.content));
    utter.rate = 1;
    utter.pitch = 1;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utter);
  }

  async function toggleDoctorMicInput() {
    if (doctorChatBusy) return;

    if (doctorChatRecording && doctorSpeechRecognition) {
      try { doctorSpeechRecognition.stop(); } catch (_) {}
      doctorSpeechRecognition = null;
      doctorChatRecording = false;
      renderDoctorChatTranscript();
      return;
    }

    if (doctorChatRecording && doctorChatMediaRecorder) {
      doctorChatMediaRecorder.stop();
      return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      try {
        const recognition = new SpeechRecognition();
        doctorSpeechRecognition = recognition;
        recognition.lang = 'en-US';
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        let receivedResult = false;

        recognition.onresult = async (event) => {
          receivedResult = true;
          const transcript = String(event?.results?.[0]?.[0]?.transcript || '').trim();

          doctorChatRecording = false;
          doctorSpeechRecognition = null;
          renderDoctorChatTranscript();

          if (!transcript) {
            showToast('Could not detect speech. Please try again.', 'error');
            return;
          }

          await submitDoctorVoiceTranscript(transcript);
        };

        recognition.onerror = (event) => {
          doctorChatRecording = false;
          doctorSpeechRecognition = null;
          renderDoctorChatTranscript();
          if (event?.error !== 'aborted') {
            showToast('Voice recognition failed. Please try again.', 'error');
          }
        };

        recognition.onend = () => {
          if (doctorSpeechRecognition === recognition) {
            doctorSpeechRecognition = null;
          }
          if (doctorChatRecording) {
            doctorChatRecording = false;
            renderDoctorChatTranscript();
            if (!receivedResult) {
              showToast('No speech detected.', 'error');
            }
          }
        };

        doctorChatRecording = true;
        renderDoctorChatTranscript();
        recognition.start();
        return;
      } catch (_) {
        doctorSpeechRecognition = null;
        doctorChatRecording = false;
      }
    }

    if (!navigator.mediaDevices?.getUserMedia || typeof MediaRecorder === 'undefined') {
      showToast('Microphone capture is not supported in this browser.', 'error');
      return;
    }

    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      doctorChatAudioChunks = [];
      const preferredMime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
        ? 'audio/webm;codecs=opus'
        : '';
      doctorChatMediaRecorder = preferredMime
        ? new MediaRecorder(stream, { mimeType: preferredMime })
        : new MediaRecorder(stream);

      doctorChatMediaRecorder.ondataavailable = (event) => {
        if (event.data && event.data.size > 0) {
          doctorChatAudioChunks.push(event.data);
        }
      };

      doctorChatMediaRecorder.onerror = () => {
        doctorChatRecording = false;
        stream.getTracks().forEach(track => track.stop());
        doctorChatMediaRecorder = null;
        renderDoctorChatTranscript();
        showToast('Failed to capture microphone input.', 'error');
      };

      doctorChatMediaRecorder.onstop = async () => {
        doctorChatRecording = false;
        stream.getTracks().forEach(track => track.stop());
        const recorder = doctorChatMediaRecorder;
        doctorChatMediaRecorder = null;

        const blobType = recorder?.mimeType || doctorChatAudioChunks[0]?.type || 'audio/webm';
        const audioBlob = new Blob(doctorChatAudioChunks, { type: blobType });
        doctorChatAudioChunks = [];

        if (!audioBlob.size) {
          renderDoctorChatTranscript();
          return;
        }

        doctorChatBusy = true;
        renderDoctorChatTranscript();

        try {
          const res = await DoctorAPI.voiceChatAudio(PATIENT_ID, audioBlob, {
            role: 'doctor',
            use_rag: true,
          });

          const transcript = String(res?.transcript || '').trim();
          if (transcript) {
            ensureDoctorChatReady();
            doctorChatMessages.push({ role: 'user', content: transcript });
          }

          doctorChatMessages.push({
            role: 'assistant',
            content: res?.response_text || 'No answer returned by AI service.',
            sources: [],
            groundingAvailable: null,
            llmError: null,
            audioBase64: res?.audio_base64 || null,
            audioFormat: res?.audio_format || null,
          });
        } catch (e) {
          doctorChatMessages.push({
            role: 'assistant',
            content: `I could not process voice input right now. ${e.message || 'Please try again.'}`,
            sources: [],
            groundingAvailable: null,
            llmError: null,
            audioBase64: null,
            audioFormat: null,
          });
          showToast(e.message || 'Failed to process voice query.', 'error');
        } finally {
          doctorChatBusy = false;
          renderDoctorChatTranscript();
        }
      };

      doctorChatRecording = true;
      doctorChatMediaRecorder.start();
      renderDoctorChatTranscript();
    } catch (_) {
      doctorChatRecording = false;
      doctorChatMediaRecorder = null;
      renderDoctorChatTranscript();
      showToast('Microphone permission denied or unavailable.', 'error');
    }
  }

  async function submitDoctorVoiceTranscript(transcript) {
    const cleanTranscript = String(transcript || '').trim();
    if (!cleanTranscript) return;

    stopDoctorChatPlayback();
    ensureDoctorChatReady();
    doctorChatMessages.push({ role: 'user', content: cleanTranscript });
    doctorChatBusy = true;
    renderDoctorChatTranscript();

    try {
      const res = await DoctorAPI.voiceChatText(PATIENT_ID, cleanTranscript, {
        role: 'doctor',
        use_rag: true,
      });

      doctorChatMessages.push({
        role: 'assistant',
        content: res?.response_text || 'No answer returned by AI service.',
        sources: [],
        groundingAvailable: null,
        llmError: null,
        audioBase64: res?.audio_base64 || null,
        audioFormat: res?.audio_format || null,
      });
    } catch (e) {
      doctorChatMessages.push({
        role: 'assistant',
        content: `I could not process voice input right now. ${e.message || 'Please try again.'}`,
        sources: [],
        groundingAvailable: null,
        llmError: null,
        audioBase64: null,
        audioFormat: null,
      });
      showToast(e.message || 'Failed to process voice query.', 'error');
    } finally {
      doctorChatBusy = false;
      renderDoctorChatTranscript();
    }

  function renderDoctorChatTranscript() {
    const threadEl = document.getElementById('doctor-chat-thread');
    const inputEl = document.getElementById('doctor-chat-input');
    const sendBtn = document.getElementById('doctor-chat-send-btn');
    const micBtn = document.getElementById('doctor-chat-mic-btn');
    if (!threadEl) return;

    threadEl.innerHTML = doctorChatMessages.map((msg, index) => {
      const isUser = msg.role === 'user';
      const body = isUser
        ? escapeHtml(msg.content || '').replace(/\n/g, '<br>')
        : renderDoctorAnswer(msg.content);
      const playbackBtn = !isUser
        ? `<div class="doctor-chat-actions"><button class="doctor-chat-action-btn" onclick="playDoctorChatMessage(${index})" title="Read response" aria-label="Read response"><svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/></svg></button></div>`
        : '';
      const sources = !isUser && msg.sources?.length
        ? `<div class="doctor-chat-sources">${msg.sources.map(src => src.url
            ? `<a class="doctor-chat-source" href="${escapeHtml(src.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(src.label)}</a>`
            : `<span class="doctor-chat-source">${escapeHtml(src.label)}</span>`
          ).join('')}</div>`
        : '';
      const groundingNote = !isUser && msg.groundingAvailable === false
        ? '<div class="doctor-chat-note">No report chunks were retrieved for this response, so grounding may be limited.</div>'
        : '';
      const llmNote = !isUser && msg.llmError
        ? '<div class="doctor-chat-note warn">AI generation fallback was used due to a temporary model error.</div>'
        : '';

      return `
      <div class="doctor-chat-message ${isUser ? 'user' : 'assistant'}">
        <div class="doctor-chat-avatar">${isUser ? 'DR' : 'AI'}</div>
        <div class="doctor-chat-message-main">
          <div class="doctor-chat-bubble">${body}</div>
          ${playbackBtn}
          ${sources}
          ${groundingNote}
          ${llmNote}
        </div>
      </div>`;
    }).join('');

    if (doctorChatBusy) {
      threadEl.innerHTML += `
      <div class="doctor-chat-message assistant">
        <div class="doctor-chat-avatar">AI</div>
        <div class="doctor-chat-bubble">Thinking<span class="doctor-chat-dots"><span></span><span></span><span></span></span></div>
      </div>`;
    }

    threadEl.scrollTop = threadEl.scrollHeight;
    const controlsDisabled = doctorChatBusy || doctorChatRecording;
    if (inputEl) inputEl.disabled = controlsDisabled;
    if (sendBtn) sendBtn.disabled = controlsDisabled;
    if (micBtn) {
      micBtn.disabled = doctorChatBusy;
      micBtn.classList.toggle('active', doctorChatRecording);
      micBtn.innerHTML = doctorChatRecording
        ? '<svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>Stop'
        : '<svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>Mic';
    }
  }

  function handleDoctorChatKeydown(event) {
    if (event.key === 'Enter' && !event.shiftKey) {
      event.preventDefault();
      submitDoctorChat();
    }
  }

  async function submitDoctorChat() {
    const inputEl = document.getElementById('doctor-chat-input');
    if (!inputEl || doctorChatBusy) return;

    const query = inputEl.value.trim();
    if (!query) return;

    stopDoctorChatPlayback();
    ensureDoctorChatReady();
    doctorChatMessages.push({ role: 'user', content: query });
    inputEl.value = '';
    doctorChatBusy = true;
    renderDoctorChatTranscript();

    try {
      const res = await DoctorAPI.ragQueryForPatient(PATIENT_ID, query, {
        role: 'doctor',
        retrieval_strategy: 'pgvector',
        top_k: 10,
        match_threshold: 0.4,
        wearable_days: 14,
      });

      doctorChatMessages.push({
        role: 'assistant',
        content: res?.answer || 'No answer returned by AI service.',
        sources: extractRagSources(res?.context?.rag_knowledge_base?.retrieved_chunks),
        groundingAvailable: res?.grounding_available,
        llmError: res?.llm_error,
        audioBase64: null,
        audioFormat: null,
      });
    } catch (e) {
      doctorChatMessages.push({
        role: 'assistant',
        content: `I could not fetch an AI response right now. ${e.message || 'Please try again.'}`,
        sources: [],
        groundingAvailable: null,
        llmError: null,
        audioBase64: null,
        audioFormat: null,
      });
      showToast(e.message || 'Failed to fetch AI response.', 'error');
    } finally {
      doctorChatBusy = false;
      renderDoctorChatTranscript();
    }
  }

      await new Promise(r => setTimeout(r, 100));

    if (document.getElementById('rd-'+reportId)) {

      allAlerts = data.alerts || [];
      const filterEl = document.getElementById('alerts-severity-filter');

  function applyAlertFilter(severity) {
    currentAlertSeverity = severity || 'all';
    renderAlertsList();
  }

  function renderAlertsList() {
    const el = document.getElementById('alerts-list');
    const noteEl = document.getElementById('alerts-count-note');
    if (!el) return;

    const filteredAlerts = currentAlertSeverity === 'all'
      ? allAlerts
      : allAlerts.filter(alert => alert.severity === currentAlertSeverity);

    if (noteEl) {
      noteEl.textContent = `${filteredAlerts.length} of ${allAlerts.length} alert${allAlerts.length === 1 ? '' : 's'} shown`;
    }

    if (!allAlerts.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div><div class="empty-title">No alerts</div><div class="empty-sub">This patient has no active health alerts</div></div>`;
      return;

      el.innerHTML = `<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M7 12h10"/><path d="M10 18h4"/></svg></div><div class="empty-title">No matching alerts</div><div class="empty-sub">Try a different severity filter to view more alerts.</div></div>`;
      return;

    el.innerHTML = filteredAlerts.map(a=>`

      <div class="alert-top">

    const payload = {
      full_name: fullName,
      email,
      phone:  document.getElementById('ep-phone').value.trim()  || null,
      gender: document.getElementById('ep-gender').value         || null,
      city:   document.getElementById('ep-city').value.trim()   || null,
      state:  document.getElementById('ep-state').value.trim()  || null,
    };
    // Remove null values to avoid overwriting with null
    Object.keys(payload).forEach(k => payload[k] === null && delete payload[k]);

    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const updated = await DoctorAPI.updateProfile(payload);
      _profileCache = updated;
      // Refresh sidebar name/avatar
      const name = updated.full_name || updated.email || 'Doctor';
      document.getElementById('sidebar-name').textContent = name;
      document.getElementById('sidebar-avatar').textContent = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      closeEditProfile();
      showToast('Profile updated successfully!', 'success');
    } catch(e) {
      errEl.textContent = e.message || 'Failed to save profile.';
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false; btn.textContent = 'Save Changes';
    }
  }

  // Close modal on overlay click
  document.getElementById('profile-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeEditProfile();
  });

  // ── Toast ─────────────────────────────────────────────
  function showToast(msg, type='success') {
    const tc = document.getElementById('toast-container');
    const t  = document.createElement('div');
    t.className = `toast ${type}`; t.textContent = msg;
    tc.appendChild(t);
    setTimeout(()=>t.remove(), 3500);
  }

  function logout() {
    localStorage.removeItem('hc_access_token');
    localStorage.removeItem('hc_refresh_token');
    localStorage.removeItem('hc_user_id');
    window.location.href = 'doctor-login.html';
  }

  init();
</script>
</body>
</html>
