<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Ask AI — HealthCompanion</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="nav"></div>
<main class="main">

  <div class="page-header">
    <div class="page-header-text">
      <h1>💬 Ask AI</h1>
      <p>Chat with your personal health AI — powered by Gemini 2.5</p>
    </div>
    <div id="patient-sel-wrap"></div>
  </div>

  <!-- Disclaimer banner -->
  <div class="alert-card" style="border-color:#1d4ed8;background:rgba(29,78,216,0.08);margin-bottom:1.25rem">
    <span style="font-size:1rem">ℹ️</span>
    <div style="font-size:.775rem;color:#93c5fd">
      <strong>Not medical advice.</strong> This AI provides lifestyle and wellness guidance based on your uploaded reports.
      Always consult your doctor before changing medications or treatments.
    </div>
  </div>

  <!-- Suggested questions (W1 demo component) -->
  <div class="section" id="suggestions-section">
    <div class="section-header"><div class="section-title">Suggested Questions</div></div>
    <div class="grid-2" id="suggestions"></div>
  </div>

  <!-- Chat window -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">Conversation</div>
      <button class="btn btn-ghost" onclick="clearChat()" style="font-size:.75rem">Clear ↺</button>
    </div>
    <div class="card" style="padding:0">
      <div id="chat-messages" style="max-height:480px;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.75rem"></div>
      <div style="border-top:1px solid var(--border);padding:.75rem 1rem;display:flex;gap:.5rem">
        <input id="chat-input" class="sel" style="flex:1;height:2.25rem"
          placeholder="Ask a health question…"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}" />
        <button class="btn btn-primary" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <!-- Context used (citations) -->
  <div class="section" id="context-section" style="display:none">
    <div class="section-header"><div class="section-title">Context Used by AI</div></div>
    <div class="card" id="context-sources" style="font-size:.775rem;color:#94a3b8"></div>
  </div>

</main>

<script>const PAGE = 'chat.html';</script>
<script src="js/demo-data.js"></script>
<script src="js/components.js"></script>
<script src="js/api.js"></script>
<script>
let currentPatient = 'pat-1';
let chatHistory = []; // live session messages
let demoIdx = 0;      // pointer into CHAT_EXAMPLES for demo playback

function init(pid) {
  currentPatient = pid;
  demoIdx = 0;
  chatHistory = [];
  document.getElementById('patient-sel-wrap').innerHTML = renderPatientSelector(pid, init);
  renderSuggestions();
  renderChat();
  document.getElementById('context-section').style.display = 'none';
}

function renderSuggestions() {
  const qs = SUGGESTED_QUESTIONS[currentPatient] || [];
  document.getElementById('suggestions').innerHTML = qs.map(q =>
    `<button class="card suggestion-btn" onclick="askQuestion(${JSON.stringify(q)})"
      style="text-align:left;cursor:pointer;font-size:.8rem;color:#cbd5e1;padding:.625rem .875rem;
             border:1px solid var(--border);background:var(--surface2);width:100%;border-radius:var(--radius);
             transition:border-color .15s" onmouseover="this.style.borderColor='#3b82f6'"
      onmouseout="this.style.borderColor='var(--border)'">${q}</button>`
  ).join('');
}

function askQuestion(text) {
  document.getElementById('chat-input').value = text;
  sendMessage();
}

function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  // Add user message
  chatHistory.push({ role:'user', content:text, timestamp: new Date().toISOString() });
  renderChat();
  scrollChat();

  // Show typing indicator
  const typing = document.createElement('div');
  typing.id = 'typing-indicator';
  typing.className = 'chat-msg assistant';
  typing.innerHTML = `<div class="chat-bubble"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
  document.getElementById('chat-messages').appendChild(typing);
  scrollChat();

  // Demo: replay CHAT_EXAMPLES if available, else generic fallback
  setTimeout(() => {
    const examples = CHAT_EXAMPLES[currentPatient] || [];
    let reply;
    // Find a matching example question (case-insensitive keyword match)
    const lc = text.toLowerCase();
    const matchEx = examples.find(e => e.role === 'assistant' && (() => {
      const qIdx = examples.indexOf(e) - 1;
      if (qIdx < 0) return false;
      const q = examples[qIdx].content.toLowerCase();
      const words = lc.split(/\W+/).filter(w => w.length > 4);
      return words.some(w => q.includes(w));
    })());

    if (matchEx) {
      reply = matchEx;
    } else if (demoIdx < examples.length) {
      // Step through demo examples in order
      while (demoIdx < examples.length && examples[demoIdx].role === 'user') demoIdx++;
      reply = examples[demoIdx] || null;
      demoIdx++;
    }

    document.getElementById('typing-indicator')?.remove();

    if (reply) {
      chatHistory.push({ role:'assistant', content:reply.content, citations:reply.citations, timestamp:new Date().toISOString() });
      if (reply.citations?.length) showContext(reply.citations);
    } else {
      chatHistory.push({
        role:'assistant',
        content: `I've reviewed your profile for ${PATIENTS.find(p=>p.id===currentPatient)?.name}. This is a demo instance — in the live system, Gemini 2.5 Flash retrieves context from your uploaded reports and answers grounded questions like this one.\n\nConnect the backend to get real AI-powered responses.`,
        citations: [],
        timestamp: new Date().toISOString(),
      });
    }
    renderChat();
    scrollChat();
  }, 900);
}

function renderChat() {
  const el = document.getElementById('chat-messages');
  if (!chatHistory.length) {
    el.innerHTML = `<div style="text-align:center;color:#475569;padding:2rem;font-size:.85rem">
      Ask a question about your health reports, labs, or environment above.</div>`;
    return;
  }
  el.innerHTML = chatHistory.map(msg => {
    const isUser = msg.role === 'user';
    const time = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    const contentHtml = msg.content.replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
    const citations = (msg.citations||[]).map(c =>
      `<div style="font-size:.7rem;color:#475569;margin-top:.25rem;padding:.2rem .4rem;background:rgba(255,255,255,.04);border-radius:.3rem">📎 ${c}</div>`
    ).join('');
    return `<div class="chat-msg ${msg.role}">
      <div class="chat-bubble">
        ${contentHtml}
        ${citations}
      </div>
      <div class="chat-time">${time}</div>
    </div>`;
  }).join('');
}

function showContext(citations) {
  document.getElementById('context-section').style.display = '';
  document.getElementById('context-sources').innerHTML = `
    <div style="margin-bottom:.5rem;font-size:.75rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em">Sources retrieved</div>
    ${citations.map(c => `<div style="padding:.3rem 0;border-bottom:1px solid var(--border)">📎 ${c}</div>`).join('')}
  `;
}

function clearChat() {
  chatHistory = [];
  demoIdx = 0;
  document.getElementById('context-section').style.display = 'none';
  renderChat();
}

function scrollChat() {
  const el = document.getElementById('chat-messages');
  el.scrollTop = el.scrollHeight;
}

init(currentPatient);
</script>
</body>
</html>
