<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Environment — HealthCompanion</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="nav"></div>
<main class="main">

  <div class="page-header">
    <div class="page-header-text">
      <h1>🌤 Environment</h1>
      <p>Air quality, weather &amp; health impact for your city — Week 4 deliverable</p>
    </div>
    <div id="patient-sel-wrap"></div>
  </div>

  <!-- AQI hero tile -->
  <div class="section">
    <div class="section-header"><div class="section-title">Air Quality Index</div></div>
    <div id="aqi-hero"></div>
  </div>

  <!-- Stat tiles row -->
  <div class="stat-grid" id="env-tiles"></div>

  <!-- AQI meaning tooltip panel -->
  <div class="section">
    <div class="section-header"><div class="section-title">What do these numbers mean?</div></div>
    <div class="grid-2" id="tooltip-panel"></div>
  </div>

  <!-- Health impact for this patient -->
  <div class="section">
    <div class="section-header"><div class="section-title">Health Advisory</div></div>
    <div class="card" id="advisory-card"></div>
  </div>

  <!-- Environmental alert influence -->
  <div class="section" id="env-alerts-section">
    <div class="section-header"><div class="section-title">Alerts Influenced by Environment</div></div>
    <div id="env-alerts-list"></div>
  </div>

  <!-- AQI legend -->
  <div class="section">
    <div class="section-header"><div class="section-title">AQI Scale Reference</div></div>
    <div class="card" style="padding:.75rem 1rem">
      <div style="display:flex;gap:.4rem;flex-wrap:wrap" id="aqi-legend"></div>
    </div>
  </div>

</main>

<script>const PAGE = 'environment.html';</script>
<script src="js/demo-data.js"></script>
<script src="js/components.js"></script>
<script src="js/api.js"></script>
<script>
let currentPatient = 'pat-1';

const AQI_COLOR = (v) => v<=50?'#10b981':v<=100?'#84cc16':v<=200?'#f59e0b':v<=300?'#f97316':v<=400?'#ef4444':'#7c3aed';
const AQI_LABEL = (v) => v<=50?'Good':v<=100?'Satisfactory':v<=200?'Moderate':v<=300?'Poor':v<=400?'Very Poor':'Severe';
const AQI_RING  = (v, max=500) => `stroke-dasharray:${(v/max*251.2).toFixed(1)} 251.2`;

function init(pid) {
  currentPatient = pid;
  const pat = PATIENTS.find(p => p.id === pid);
  const env = ENVIRONMENT[pat.city] || Object.values(ENVIRONMENT)[0];
  document.getElementById('patient-sel-wrap').innerHTML = renderPatientSelector(pid, init);
  renderAQIHero(env);
  renderEnvTiles(env);
  renderTooltips();
  renderAdvisory(env, pat);
  renderEnvAlerts(env, pid);
  renderLegend();
}

function renderLegend() {
  const legend = [
    ['0-50', 'Good', '#10b981'],
    ['51-100', 'Satisfactory', '#84cc16'],
    ['101-200', 'Moderate', '#f59e0b'],
    ['201-300', 'Poor', '#f97316'],
    ['301-400', 'Very Poor', '#ef4444'],
    ['401+', 'Severe', '#7c3aed'],
  ];
  document.getElementById('aqi-legend').innerHTML = legend.map(([range, label, color]) => `
    <div style="flex:1;min-width:90px;padding:.4rem .6rem;border-radius:.4rem;background:${color}18;border:1px solid ${color}44">
      <div style="font-size:.6rem;font-weight:700;color:${color};text-transform:uppercase">${label}</div>
      <div style="font-size:.7rem;color:#94a3b8;margin-top:.1rem">${range}</div>
    </div>
  `).join('');
}

function renderAQIHero(env) {
  const col = AQI_COLOR(env.aqi);
  const label = AQI_LABEL(env.aqi);
  const pct = Math.min(env.aqi / 500, 1);
  const dash = (pct * 251.2).toFixed(1);

  document.getElementById('aqi-hero').innerHTML = `
    <div class="card" style="display:flex;align-items:center;gap:2rem;flex-wrap:wrap">
      <div style="position:relative;width:120px;height:120px;flex-shrink:0">
        <svg width="120" height="120" viewBox="0 0 90 90">
          <circle cx="45" cy="45" r="40" fill="none" stroke="var(--surface3)" stroke-width="8"/>
          <circle cx="45" cy="45" r="40" fill="none" stroke="${col}" stroke-width="8"
            stroke-dasharray="${dash} 251.2" stroke-linecap="round" transform="rotate(-90 45 45)"
            style="transition:stroke-dasharray .6s ease"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
          <span style="font-size:1.6rem;font-weight:800;color:${col}">${env.aqi}</span>
          <span style="font-size:.55rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em">AQI</span>
        </div>
      </div>
      <div>
        <div style="font-size:1.2rem;font-weight:700;color:${col}">${label}</div>
        <div style="font-size:.875rem;color:#94a3b8;margin-top:.2rem">${env.city} · ${env.date}</div>
        <div style="margin-top:.5rem;display:flex;gap:.75rem;flex-wrap:wrap">
          <span style="font-size:.8rem;color:var(--muted)">🌡 ${env.temperature}°C</span>
          <span style="font-size:.8rem;color:var(--muted)">💧 ${env.humidity}%</span>
          <span style="font-size:.8rem;color:var(--muted)">☁ ${env.weather}</span>
          <span style="font-size:.8rem;color:var(--muted)">🍂 ${env.season}</span>
        </div>
        ${env.heatwave ? `<div style="margin-top:.5rem"><span class="badge badge-red">⚠ Heatwave advisory</span></div>` : ''}
      </div>
    </div>`;
}

function renderEnvTiles(env) {
  const col = AQI_COLOR(env.aqi);
  document.getElementById('env-tiles').innerHTML = [
    { label:'PM2.5',      value:env.pm25,        unit:'µg/m³',  accent: env.pm25>35?'red':env.pm25>12?'amber':'green' },
    { label:'PM10',       value:env.pm10,         unit:'µg/m³',  accent: env.pm10>50?'red':env.pm10>25?'amber':'green' },
    { label:'Temperature',value:env.temperature,  unit:'°C',     accent: env.temperature>38?'red':env.temperature>32?'amber':'blue' },
    { label:'Humidity',   value:env.humidity+'%', unit:'',       accent: env.humidity>80?'amber':'blue' },
  ].map(renderSummaryTile).join('');
}

function renderTooltips() {
  document.getElementById('tooltip-panel').innerHTML = [
    { title: 'What is AQI?', body: 'Air Quality Index (AQI) is a standardised measure of how polluted the air is. It accounts for multiple pollutants including PM2.5, PM10, NO₂, SO₂, CO, and Ozone. Higher values indicate more polluted air.' },
    { title: 'What is PM2.5?', body: 'PM2.5 are fine particulate matter under 2.5 micrometers in diameter — small enough to enter the bloodstream via the lungs. High PM2.5 is linked to cardiovascular and respiratory disease, and worsens anaemia by reducing lung oxygen efficiency.' },
    { title: 'Why does temperature matter?', body: 'High temperatures increase fluid loss through sweat, raising heart rate for the same activity level. For diabetic and cardiac patients, heat stress worsens dehydration and can elevate BP and blood sugar.' },
    { title: 'How does environment affect alerts?', body: 'The rules engine can elevate alert severity when environmental conditions interact with your health profile. For example, AQI > 100 combined with anaemia raises the environment alert from low → medium.' },
  ].map(t => `<div class="card" style="font-size:.82rem">
    <div style="font-weight:600;margin-bottom:.35rem;color:var(--text)">${t.title}</div>
    <div style="color:#94a3b8;line-height:1.55">${t.body}</div>
  </div>`).join('');
}

function renderAdvisory(env, pat) {
  document.getElementById('advisory-card').innerHTML = `
    <div style="display:flex;gap:.75rem;align-items:flex-start">
      <span style="font-size:1.5rem;flex-shrink:0">🏥</span>
      <div>
        <div style="font-weight:600;margin-bottom:.4rem">Advisory for ${pat.name}</div>
        <div style="font-size:.85rem;color:#cbd5e1;line-height:1.6">${env.advisory}</div>
        <div style="margin-top:.75rem;font-size:.75rem;color:#475569">Conditions: ${pat.conditions.join(' · ')}</div>
      </div>
    </div>`;
}

function renderEnvAlerts(env, pid) {
  const section = document.getElementById('env-alerts-section');
  const list    = document.getElementById('env-alerts-list');
  const envAlerts = (ALERTS[pid] || []).filter(a => a.category === 'environment');
  if (!envAlerts.length && !env.alert_influence.length) {
    section.style.display = 'none';
    return;
  }
  section.style.display = '';
  list.innerHTML = envAlerts.map(a => renderAlertCard(a)).join('') +
    (env.alert_influence.length ? `<div class="card mt-2" style="font-size:.78rem;color:#94a3b8">
      <div style="font-weight:600;margin-bottom:.35rem;color:var(--text)">Severity modifiers applied by rules engine</div>
      ${env.alert_influence.map(i => `<div style="padding:.2rem 0;border-bottom:1px solid var(--border)">⚡ ${i}</div>`).join('')}
    </div>` : '');
}

init(currentPatient);
</script>
</body>
</html>
