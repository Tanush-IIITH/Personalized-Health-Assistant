<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Reports — HealthCompanion</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="nav"></div>
<main class="main">

  <div class="page-header">
    <div class="page-header-text">
      <h1>📄 Reports</h1>
      <p>Upload and track your medical PDF reports</p>
    </div>
    <div id="patient-sel-wrap"></div>
  </div>

  <!-- Upload zone (W2 — report intake UI) -->
  <div class="upload-zone" onclick="document.getElementById('file-input').click()">
    <input type="file" id="file-input" accept=".pdf,.jpg,.png" style="display:none" onchange="handleUpload(this)">
    <div class="upload-zone-icon">📤</div>
    <div class="upload-zone-text">Drop a PDF or click to browse</div>
    <div class="upload-zone-sub">Supported: PDF, JPG, PNG · Max 20 MB</div>
  </div>
  <div id="upload-status" style="margin-top:.5rem;font-size:.75rem;color:#94a3b8"></div>

  <!-- Report stats -->
  <div class="stat-grid" id="report-stats" style="margin-top:1.25rem"></div>

  <!-- Report timeline (W2 deliverable) -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">Report History</div>
      <select class="sel" id="type-filter" onchange="applyFilter(this.value)">
        <option value="">All types</option>
        <option value="Iron">Iron Studies</option>
        <option value="Diabetes">Diabetes Panel</option>
        <option value="Lipid">Lipid Profile</option>
        <option value="Vitamin">Vitamin Panel</option>
        <option value="Kidney">Kidney Panel</option>
        <option value="Blood">Blood Pressure</option>
      </select>
    </div>
    <div class="card" id="timeline-wrap" style="padding:0 1.25rem"></div>
  </div>

  <!-- Lab results table (W2 — for selected report) -->
  <div class="section" id="lab-section" style="display:none">
    <div class="section-header">
      <div class="section-title" id="lab-table-title">Lab Results</div>
      <button class="btn btn-ghost" onclick="document.getElementById('lab-section').style.display='none'">Close</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Test</th><th>Value</th><th>Status</th></tr></thead>
        <tbody id="lab-table-body"></tbody>
      </table>
    </div>
  </div>

</main>

<script>const PAGE = 'reports.html';</script>
<script src="js/demo-data.js"></script>
<script src="js/components.js"></script>
<script src="js/api.js"></script>
<script>
let allReports = [];
let activeReportFilter = '';
const activeWsSubscriptions = new Map();

const STATUS_TEXT = {
  processing: 'Processing OCR and extraction…',
  validating: 'Validating extracted report data…',
  completed: 'Report processing completed.',
  failed: 'Report processing failed.',
};

function mapBackendStatus(status) {
  if (status === 'done' || status === 'completed') return 'ready';
  if (status === 'failed' || status === 'error') return 'error';
  if (status === 'pending' || status === 'ocr_complete' || status === 'processing' || status === 'validating') return 'processing';
  return 'ready';
}

function normalizedType(type) {
  if (!type) return 'Medical Report';
  return String(type)
    .replace(/_/g, ' ')
    .replace(/\b\w/g, (c) => c.toUpperCase());
}

function normalizeReport(row) {
  if (row && row.filename && row.upload_date) {
    return row;
  }

  const status = mapBackendStatus(row?.processing_status);
  const findings = [];
  if (status === 'processing') findings.push('Processing — OCR and extraction running');
  if (status === 'error' && row?.processing_error) findings.push(`Error — ${row.processing_error}`);

  return {
    id: row?.id || `report-${Math.random().toString(36).slice(2, 8)}`,
    filename: row?.source_file_name || 'report.pdf',
    type: normalizedType(row?.report_type),
    upload_date: row?.created_at ? new Date(row.created_at).toISOString().slice(0, 10) : '—',
    status,
    page_count: row?.page_count || 1,
    dot_color: status === 'ready' ? '#10b981' : status === 'error' ? '#ef4444' : '#f59e0b',
    findings,
    backendId: row?.id || null,
  };
}

function setUploadStatus(message, color = '#94a3b8') {
  const status = document.getElementById('upload-status');
  status.style.color = color;
  status.textContent = message;
}

function cleanupSubscriptions() {
  activeWsSubscriptions.forEach((unsubscribe) => {
    try { unsubscribe(); } catch (_) {}
  });
  activeWsSubscriptions.clear();
}

window.addEventListener('beforeunload', cleanupSubscriptions);

async function handleUpload(input) {
  if (!input.files.length) return;
  const f = input.files[0];
  if (!(f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'))) {
    setUploadStatus('Only PDF reports are supported by the backend ingest endpoint.', '#ef4444');
    input.value = '';
    return;
  }

  const userId = localStorage.getItem('hc_user_id');
  const userName = localStorage.getItem('hc_user_name') || null;
  if (!userId) {
    setUploadStatus('Please log in first: missing user_id for upload.', '#ef4444');
    input.value = '';
    return;
  }

  try {
    setUploadStatus(`Uploading "${f.name}"…`, '#f59e0b');
    const ingest = await API.ingestReport(f, userId, userName);
    const reportId = ingest?.report_id;
    if (!reportId) {
      throw new Error('Upload succeeded but report_id was not returned by backend.');
    }

    setUploadStatus(`Upload successful. ${STATUS_TEXT.processing}`, '#f59e0b');

    const previous = activeWsSubscriptions.get(reportId);
    if (previous) {
      previous();
      activeWsSubscriptions.delete(reportId);
    }

    const unsubscribe = API.subscribeReportStatus(reportId, {
      onOpen: () => {
        setUploadStatus(`Connected to live status updates for report ${reportId}.`, '#94a3b8');
      },
      onMessage: async (payload) => {
        const stage = payload?.status || 'processing';
        if (stage === 'completed') {
          const tests = payload?.data?.tests_detected;
          const suffix = Number.isFinite(tests) ? ` Tests detected: ${tests}.` : '';
          setUploadStatus(`Report completed.${suffix}`, '#10b981');
          const stop = activeWsSubscriptions.get(reportId);
          if (stop) {
            stop();
            activeWsSubscriptions.delete(reportId);
          }
          await refreshReports();
          return;
        }

        if (stage === 'failed') {
          const reason = payload?.error?.reason || 'Unknown failure';
          setUploadStatus(`Report failed: ${reason}`, '#ef4444');
          const stop = activeWsSubscriptions.get(reportId);
          if (stop) {
            stop();
            activeWsSubscriptions.delete(reportId);
          }
          await refreshReports();
          return;
        }

        setUploadStatus(STATUS_TEXT[stage] || STATUS_TEXT.processing, '#f59e0b');
      },
      onError: () => {
        setUploadStatus('Live status connection error. Retrying…', '#f59e0b');
      },
      onClose: () => {
        if (activeWsSubscriptions.has(reportId)) {
          setUploadStatus('Live status connection closed. Attempting reconnect…', '#f59e0b');
        }
      },
    });

    activeWsSubscriptions.set(reportId, unsubscribe);
    await refreshReports();
  } catch (err) {
    setUploadStatus(`Upload failed: ${err.message || err}`, '#ef4444');
  } finally {
    input.value = '';
  }
}

function applyFilter(type) {
  activeReportFilter = type || '';
  const filtered = type ? allReports.filter(r => r.type.includes(type)) : allReports;
  document.getElementById('timeline-wrap').innerHTML = renderTimeline(filtered);
  attachTimelineClicks(filtered);
}

function attachTimelineClicks(visibleReports = allReports) {
  // Make timeline items clickable to show lab table
  document.querySelectorAll('.timeline-item').forEach((el, i) => {
    el.style.cursor = 'pointer';
    el.addEventListener('click', () => showLabs(visibleReports[i]));
  });
}

function showLabs(report) {
  const sec = document.getElementById('lab-section');
  sec.style.display = 'block';
  document.getElementById('lab-table-title').textContent = report.filename + ' — Lab Results';
  document.getElementById('lab-table-body').innerHTML = report.findings.map(f => {
    const isHigh = f.includes('HIGH');
    const isLow  = f.includes('LOW');
    const parts  = f.split(' — ');
    const status = parts[1] || 'Normal';
    return `<tr><td>${parts[0]}</td><td>${parts[0].split(' ').pop()}</td>
      <td>${badge(isHigh||isLow ? (isHigh?'high':'medium') : 'normal')}</td></tr>`;
  }).join('');
  sec.scrollIntoView({ behavior: 'smooth' });
}

async function render(pid) {
  document.getElementById('patient-sel-wrap').innerHTML = buildPatientSelector(pid, 'switchPatient(this.value)');
  const rows = await API.reports(pid);
  allReports = (rows || []).map(normalizeReport);

  const flags = allReports.reduce((s,r) => s + r.findings.filter(f=>f.includes('HIGH')||f.includes('LOW')).length, 0);
  document.getElementById('report-stats').innerHTML = [
    { label:'Reports', value:allReports.length, unit:'total', accent:'blue', trend:'' },
    { label:'Lab Flags', value:flags, unit:'abnormal', accent:flags>0?'red':'green', trend:'' },
    { label:'Latest Report', value:allReports[0]?.upload_date||'—', unit:'', accent:'gray', trend:'' },
  ].map(t => renderSummaryTile({ ...t, sparkline:[] })).join('');

  const filtered = activeReportFilter ? allReports.filter(r => r.type.includes(activeReportFilter)) : allReports;
  document.getElementById('timeline-wrap').innerHTML = renderTimeline(filtered);
  attachTimelineClicks(filtered);
}

function switchPatient(pid) { render(pid); }

async function refreshReports() {
  const pid = document.getElementById('patient-sel')?.value || 'pat-1';
  await render(pid);
}

render('pat-1');
</script>
</body>
</html>
